<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Neves Finance</title>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages

      // Auto-detect base path for GitHub Pages (username.github.io/repo/) or custom domain
      var l = window.location;

      // If hostname ends with github.io, assume repo subpath (keep 1 segment)
      // Otherwise assume custom domain (keep 0 segments)
      var pathSegmentsToKeep = l.hostname.endsWith('.github.io') ? 1 : 0;

      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
